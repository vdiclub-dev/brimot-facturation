<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
  <title>Connexion — Brimot Facturation</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script data-cfasync="false" src="../js/supabase.min.js"></script>
  <script data-cfasync="false" src="../js/config.js"></script>
  <script data-cfasync="false" src="../js/auth.js"></script>
  <style>
    :root {
      --night:   #0a0a0f;
      --night2:  #111118;
      --night3:  #18181f;
      --surface: #1e1e28;
      --border:  rgba(255,255,255,.07);
      --border2: rgba(255,255,255,.13);
      --white:   #fff;
      --muted:   rgba(255,255,255,.38);
      --muted2:  rgba(255,255,255,.6);
      --brimot:  #0ea5e9;
      --brimot2: #0284c7;
      --red:     #e8311a;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      font-family: 'Outfit', sans-serif;
      background: var(--night);
      color: var(--white);
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    .card {
      background: var(--night3);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 40px rgba(0,0,0,.4);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .logo-mark {
      width: 40px; height: 40px;
      background: var(--brimot);
      border-radius: 12px;
      display: grid; place-items: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .logo-text {
      font-family: 'Bebas Neue', cursive;
      font-size: 20px;
      letter-spacing: 1px;
      line-height: 1.1;
    }
    .logo-text em {
      color: var(--brimot);
      font-style: normal;
      font-size: 11px;
      display: block;
      letter-spacing: 2px;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 13px;
      color: var(--muted2);
      margin-bottom: 28px;
    }

    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }
    .field input {
      width: 100%;
      padding: 11px 14px;
      background: var(--surface);
      border: 1.5px solid var(--border2);
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      color: var(--white);
      outline: none;
      transition: border-color .2s;
    }
    .field input:focus { border-color: var(--brimot); }
    .field input::placeholder { color: rgba(255,255,255,.22); }

    .btn-submit {
      width: 100%;
      padding: 13px;
      background: var(--brimot);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-submit:hover:not(:disabled) { background: var(--brimot2); }
    .btn-submit:disabled { opacity: .55; cursor: not-allowed; }

    .alert {
      display: none;
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .alert.error  { background: rgba(232,49,26,.1); border: 1px solid rgba(232,49,26,.25); color: #fca5a5; }
    .alert.info   { background: rgba(14,165,233,.08); border: 1px solid rgba(14,165,233,.2); color: var(--brimot); }
    .alert.show   { display: block; }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    .btn-submit.loading .spinner { display: block; }
    .btn-submit.loading .btn-label { opacity: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      margin-top: 28px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-mark">🧹</div>
    <div class="logo-text">BRIMOT<em>FACTURATION</em></div>
  </div>

  <h1>Connexion</h1>
  <p class="subtitle">Portail interne de facturation Brimot.</p>

  <div class="alert" id="alertBox"></div>

  <form id="loginForm" novalidate>
    <div class="field">
      <label for="email">Adresse e-mail</label>
      <input type="email" id="email" name="email" autocomplete="email"
             placeholder="admin@brimot.ch" required>
    </div>
    <div class="field">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" name="password" autocomplete="current-password"
             placeholder="••••••••" required>
    </div>

    <button type="submit" class="btn-submit" id="submitBtn">
      <div class="spinner"></div>
      <span class="btn-label">Se connecter</span>
    </button>
  </form>

  <div class="footer">
    Brimot Nettoyage · Portail de facturation interne
  </div>
</div>

<script>
(function () {
  'use strict';

  var db = window.SUPABASE_CLIENT;
  var form = document.getElementById('loginForm');
  var btn  = document.getElementById('submitBtn');
  var alertBox = document.getElementById('alertBox');

  function showAlert(type, msg) {
    alertBox.className = 'alert show ' + type;
    alertBox.textContent = msg;
  }
  function hideAlert() {
    alertBox.className = 'alert';
    alertBox.textContent = '';
  }
  function setLoading(on) {
    btn.disabled = on;
    btn.classList.toggle('loading', on);
  }

  // Si déjà connecté avec le bon rôle → rediriger directement
  async function checkExistingSession() {
    if (!db) return;
    try {
      var ctx = await window.colixoGetAuthContext({
        roles: ['admin', 'super_admin'],
        redirectOnFail: false
      });
      if (ctx && ctx.profile && ['admin', 'super_admin'].includes(ctx.role)) {
        window.location.replace('../app/');
      }
    } catch (_) {}
  }
  checkExistingSession();

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    hideAlert();

    var email    = document.getElementById('email').value.trim().toLowerCase();
    var password = document.getElementById('password').value;

    if (!email || !password) {
      showAlert('error', 'Veuillez saisir votre e-mail et votre mot de passe.');
      return;
    }

    if (!db) {
      showAlert('error', '❌ Client Supabase non initialisé. Vérifiez js/config.js.');
      return;
    }

    setLoading(true);
    showAlert('info', 'Vérification en cours...');

    try {
      // 1. Authentification Supabase
      var res = await db.auth.signInWithPassword({ email: email, password: password });
      if (res.error) {
        setLoading(false);
        showAlert('error', 'Identifiants incorrects.');
        return;
      }

      // 2. Vérifier le rôle admin dans public.profiles via auth.users.id
      var ctx = await window.colixoGetAuthContext({
        roles: ['admin', 'super_admin'],
        redirectOnFail: false
      });

      if (!ctx || !ctx.profile || !['admin', 'super_admin'].includes(ctx.role)) {
        await db.auth.signOut();
        setLoading(false);
        showAlert('error', 'Accès réservé aux administrateurs Brimot.');
        return;
      }

      // 3. Succès → application
      showAlert('info', 'Connexion réussie. Redirection...');
      window.location.replace('../app/');

    } catch (err) {
      setLoading(false);
      showAlert('error', err && err.message ? err.message : 'Erreur de connexion.');
    }
  });
})();
</script>

</body>
</html>
